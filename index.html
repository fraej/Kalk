<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful scientific calculator powered by MathLive with LaTeX input, symbolic computation, and numeric evaluation.">
  <title>Scientific Calculator — MathLive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css?v=5">
</head>
<body>
  <div class="calculator" id="calculator">
    <!-- Top brand bar -->
    <div class="brand-bar">
      <span class="brand-logo">⚡</span>
      <span class="brand-name">SciCalc</span>
      <span class="brand-model">MathLive Edition</span>
      <div class="mode-indicators">
        <span class="mode-pill active" id="mode-rad">RAD</span>
        <span class="mode-pill" id="mode-deg">DEG</span>
      </div>
    </div>

    <!-- Display area -->
    <div class="display-area" id="display-area">
      <!-- History entries rendered here -->
      <div class="history-list" id="history-list"></div>

      <!-- Current expression input -->
      <div class="current-input">
        <math-field id="mathfield" virtual-keyboard-mode="off" math-virtual-keyboard-policy="manual"></math-field>
      </div>

      <!-- Result preview -->
      <div class="result-preview" id="result-preview">
        <span class="result-label">=</span>
        <span class="result-value" id="result-value"></span>
      </div>
    </div>

    <!-- Scientific function buttons -->
    <div class="button-panel">
      <!-- Row: Shift + trig & functions -->
      <div class="button-row fn-row">
        <button class="btn btn-fn btn-shift" id="btn-shift" data-action="shift">2nd</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="sin">sin</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="cos">cos</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="tan">tan</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="ln">ln</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="log">log</button>
      </div>

      <!-- Row: Inverse trig (hidden by default, shown with 2nd) -->
      <div class="button-row fn-row shift-row" id="shift-row" style="display:none;">
        <button class="btn btn-fn btn-shift-active" data-action="shift">2nd</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="arcsin">sin⁻¹</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="arccos">cos⁻¹</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="arctan">tan⁻¹</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="exp">eˣ</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="pow10">10ˣ</button>
      </div>

      <!-- Row: Powers, roots, constants -->
      <div class="button-row fn-row">
        <button class="btn btn-fn" data-action="insert" data-cmd="sqrt">√</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="square">x²</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="pi">π</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="euler">e</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="parens">( )</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="factorial">n!</button>
      </div>

      <!-- Row: Abs, fraction, power, percent -->
      <div class="button-row fn-row">
        <button class="btn btn-fn" data-action="insert" data-cmd="abs">|x|</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="frac">⅟x</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="power">xʸ</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="percent">%</button>
        <button class="btn btn-fn" data-action="insert" data-cmd="sci">EXP</button>
        <button class="btn btn-fn" data-action="toggleSign">±</button>
      </div>

      <!-- Numeric pad + operators -->
      <div class="numpad-grid">
        <!-- Row 1 -->
        <button class="btn btn-num" data-action="insert" data-cmd="7">7</button>
        <button class="btn btn-num" data-action="insert" data-cmd="8">8</button>
        <button class="btn btn-num" data-action="insert" data-cmd="9">9</button>
        <button class="btn btn-op" data-action="insert" data-cmd="div">÷</button>
        <button class="btn btn-action btn-del" data-action="delete" id="btn-delete">⌫</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="insert" data-cmd="4">4</button>
        <button class="btn btn-num" data-action="insert" data-cmd="5">5</button>
        <button class="btn btn-num" data-action="insert" data-cmd="6">6</button>
        <button class="btn btn-op" data-action="insert" data-cmd="mul">×</button>
        <button class="btn btn-action btn-clear" data-action="clear" id="btn-clear">AC</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="insert" data-cmd="1">1</button>
        <button class="btn btn-num" data-action="insert" data-cmd="2">2</button>
        <button class="btn btn-num" data-action="insert" data-cmd="3">3</button>
        <button class="btn btn-op" data-action="insert" data-cmd="sub">−</button>
        <button class="btn btn-equals" data-action="evaluate" id="btn-equals" rowspan="2">=</button>

        <!-- Row 4 -->
        <button class="btn btn-num btn-zero" data-action="insert" data-cmd="0">0</button>
        <button class="btn btn-num" data-action="insert" data-cmd="dot">.</button>
        <button class="btn btn-num" data-action="insert" data-cmd="comma">,</button>
        <button class="btn btn-op" data-action="insert" data-cmd="add">+</button>
      </div>
    </div>

    <!-- Bottom decorative strip -->
    <div class="bottom-strip"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
